stages:
  - lint
  - test
  - security

# ── Lint ──────────────────────────────────────────────────────────────────────

shellcheck:
  stage: lint
  image: koalaman/shellcheck-alpine:stable
  script:
    - find . -name "*.sh" -not -path "./.git/*" | xargs shellcheck --severity=warning
  rules:
    - changes:
        - "**/*.sh"
        - .gitlab-ci.yml

shfmt:
  stage: lint
  image: mvdan/shfmt:latest
  script:
    - find . -name "*.sh" -not -path "./.git/*" | xargs shfmt -d -i 2 -ci
  rules:
    - changes:
        - "**/*.sh"
        - .gitlab-ci.yml

# ── Test ──────────────────────────────────────────────────────────────────────

bats:linux:
  stage: test
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq && apt-get install -y -qq bats
  script:
    - bats dev-workstation-build/tests/
  rules:
    - changes:
        - dev-workstation-build/**/*
        - .gitlab-ci.yml

# ── Security ──────────────────────────────────────────────────────────────────

sast:
  stage: security

secret_detection:
  stage: security

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'
